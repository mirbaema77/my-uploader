<!DOCTYPE html>
<html>
<head><title>Friend Upload</title></head>
<body>
  <h2>Upload File to My Bucket</h2>
  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload</button>
  <p id="status">Status: Ready</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // These are now correctly named to match the usage below
    const SUPABASE_URL = 'https://xnvfcqvbofmaoepecddx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhudmZjcXZib2ZtYW9lcGVjZGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjQzMTEsImV4cCI6MjA4NjkwMDMxMX0.sgnOfz3qESKK8wEBQDpNTlvXlLHLEEV4CpvTHpLV3Pk';
    const BUCKET_NAME = 'FMStadio_Training_Drills';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function uploadFile() {
      const fileInput = document.getElementById('fileInput');
      const status = document.getElementById('status');
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select a file first!");
        return;
      }

      try {
        status.innerText = "Status: Attempting upload...";
        
        // This sends the file to Supabase
        const { data, error } = await supabase.storage
          .from(BUCKET_NAME)
          .upload(file.name, file, { 
            upsert: true 
          });

        if (error) throw error;

        status.innerText = "Status: Success! File uploaded.";
        alert("Success! Check your Supabase bucket.");
      } catch (err) {
        status.innerText = "Status: Error - " + err.message;
        alert("UPLOAD FAILED: " + err.message);
      }
    }
  </script>
</body>
</html>
