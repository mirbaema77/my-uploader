<!DOCTYPE html>
<html>
<head><title>Friend Upload</title></head>
<body>
  <h2>Upload File to My Bucket</h2>
  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload</button>
  <p id="status">Status: Ready</p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xnvfcqvbofmaoepecddx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhudmZjcXZib2ZtYW9lcGVjZGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjQzMTEsImV4cCI6MjA4NjkwMDMxMX0.sgnOfz3qESKK8wEBQDpNTlvXlLHLEEV4CpvTHpLV3Pk';
    const BUCKET_NAME = 'FMStadio_Training_Drills';

    // ✅ Named dbClient to avoid clashing with window.supabase
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('status').innerText = 'Status: Ready ✅';

    async function uploadFile() {
      const status = document.getElementById('status');
      const file = document.getElementById('fileInput').files[0];

      if (!file) {
        alert('Please select a file first!');
        return;
      }

      status.innerText = 'Uploading ' + file.name + '...';

      try {
        const { data, error } = await dbClient.storage
          .from(BUCKET_NAME)
          .upload(file.name, file, { upsert: true });

        if (error) throw error;

        status.innerText = '✅ Uploaded: ' + file.name;
      } catch (err) {
        console.error(err);
        status.innerText = '❌ Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
